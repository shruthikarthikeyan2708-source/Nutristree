<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutristree</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Welcome to Nutristree</h1>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#recipes">Recipes</a></li>
                <li><a href="#newsletter">Newsletter</a></li>
                <li><a href="#contact">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="home">
            <h2>Your source for healthy recipes</h2>
            <p>Discover nutritious recipes tailored to your lifestyle.</p>
        </section>
        <section id="recipes">
            <h2>Explore Recipes</h2>
            <input type="text" placeholder="Search recipes...">
            <div class="recipe-list">
                <!-- Recipe cards will go here -->
            </div>
        </section>
        <section id="newsletter">
            <h2>Sign up for our Newsletter</h2>
            <form>
                <label for="email">Email:</label>
                <input type="email" id="email" required>
                <button type="submit">Subscribe</button>
            </form>
        </section>
    </main>
    <footer>
        <p>Follow us on social media:</p>
        <div class="social-sharing">
            <!-- Social media links -->
        </div>
        <button id="scrollToTop">Scroll to Top</button>
    </footer>
</body>
</html>
