<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutristree</title>

    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Welcome to Nutristree</h1>
        <button id="darkModeToggle">Toggle Dark Mode</button>
    </header>
    <main>
        <section id="newsletter">
            <h2>Subscribe to our Newsletter</h2>
            <form id="newsletterForm">
                <input type="email" placeholder="Enter your email" required>
                <button type="submit">Subscribe</button>
            </form>
        </section>

        <section id="recipeSearch">
            <h2>Search for Recipes</h2>
            <input type="text" id="recipeInput" placeholder="Enter recipe name">
            <button id="searchButton">Search</button>
            <div id="searchResults"></div>
        </section>

        <section id="content">
            <h2>Our Amazing Recipes</h2>
            <!-- Recipe cards go here -->
        </section>
    </main>

    <footer>
        <p>Follow us on social media</p>
        <div id="socialMedia">
            <a href="#">Facebook</a>
            <a href="#">Twitter</a>
            <a href="#">Instagram</a>
        </div>
    </footer>
    <script>
        // Dark Mode Toggle
        const darkModeToggle = document.getElementById('darkModeToggle');
        darkModeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
        });

        // Newsletter Form Submission
        const newsletterForm = document.getElementById('newsletterForm');
        newsletterForm.addEventListener('submit', (e) => {
            e.preventDefault();
            // Handle subscription logic
            alert('Subscribed successfully!');
        });

        // Recipe Search Functionality
        const searchButton = document.getElementById('searchButton');
        searchButton.addEventListener('click', () => {
            const recipe = document.getElementById('recipeInput').value;
            // Implement search logic here
            alert('Searching for ' + recipe);
        });
    </script>
</body>
</html>
