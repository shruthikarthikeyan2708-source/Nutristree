<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Random Joke Generator</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            margin: 0;\n            padding: 0;\n            background-color: #282c34;\n            color: #ffffff;\n            display: flex;\n            flex-direction: column;\n            align-items: center;\n            justify-content: center;\n            height: 100vh;\n            transition: background-color 0.5s;\n        }\n        button {\n            background: #61dafb;\n            border: none;\n            color: #282c34;\n            padding: 10px 20px;\n            margin: 10px;\n            border-radius: 5px;\n            cursor: pointer;\n            transition: background 0.3s;\n        }\n        button:hover {\n            background: #21a1f1;\n        }\n        #joke {\n            margin: 20px;\n            font-size: 1.5em;\n            text-align: center;\n        }\n        .dark-mode {\n            background-color: #282c34;\n            color: #ffffff;\n        }\n        .light-mode {\n            background-color: #f7f7f7;\n            color: #282c34;\n        }\n    </style>\n</head>\n<body class="dark-mode">\n    <h1>Random Joke Generator</h1>\n    <div id="joke">Press the button to get a joke!</div>\n    <button id="getJoke">Get Joke</button>\n    <button id="copyJoke" style="display:none;">Copy to Clipboard</button>\n    <button id="toggleMode">Toggle Dark Mode</button>\n    <script>\n        const jokeElement = document.getElementById('joke');\n        const getJokeButton = document.getElementById('getJoke');\n        const copyJokeButton = document.getElementById('copyJoke');\n        const toggleModeButton = document.getElementById('toggleMode');\n        const body = document.body;\n\n        async function getJoke() {\n            const res = await fetch('https://v2.jokeapi.dev/joke/Any');\n            const jokeData = await res.json();\n            if (jokeData.setup) {\n                jokeElement.innerHTML = `<strong>${jokeData.setup}</strong> <br>${jokeData.delivery}`;\n            } else {\n                jokeElement.innerHTML = jokeData.joke;\n            }\n            copyJokeButton.style.display = 'inline-block';\n        }\n\n        getJokeButton.addEventListener('click', getJoke);\n\n        copyJokeButton.addEventListener('click', () => {\n            navigator.clipboard.writeText(jokeElement.innerHTML).then(() => {\n                alert('Joke copied to clipboard!');\n            });\n        });\n\n        toggleModeButton.addEventListener('click', () => {\n            body.classList.toggle('dark-mode');\n            body.classList.toggle('light-mode');\n        });\n    </script>\n</body>\n</html>
